# Repo-root tooling configuration. Distribution metadata (project name,
# dependencies, build backend) lives in the per-package pyproject.toml files
# under checkpoint/, model/, and export/. Only formatter/linter settings live
# here so they apply uniformly across the monorepo.

[tool.pyink]
line-length = 80
unstable = true
target-version = []
pyink-indentation = 2
pyink-use-majority-quotes = true
pyink-annotation-pragmas = [
  "noqa",
  "pylint:",
  "type: ignore",
  "pytype:",
  "mypy:",
  "pyright:",
  "pyre-",
  "@title",
  "@param",
  "@markdown",
  "@tidy",
  "@test",
]
pyink-ipynb-indentation = 2

[tool.isort]
profile = "google"
known_third_party = ["orbax"]
