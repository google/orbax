suite_name: "V1 Checkpointer Cancel Benchmark"

mesh_configs:
  - mesh_axes: ["data", "model"]
    ici_parallelism: {"data": 2, "model": 2}
  - mesh_axes: ["data", "model"]
    ici_parallelism: {"data": 1, "model": 16}
    dcn_parallelism: {"data": 2, "model": 1}

checkpoint_config:
  spec:
    array: {dtype: "float32", shape: [1024, 2048], sharding: ["data", "model"]}

benchmarks:
  - generator: "orbax.checkpoint._src.testing.benchmarks.v1_checkpointer_cancel_benchmark.V1CheckpointerCancelBenchmark"
    options:
      cancel_delay_secs: [0.5]
      perform_cancellation: [True, False]
